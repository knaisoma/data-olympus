# Template for the data-olympus-mcp Secret.
# Operator:
# 1. cp secret.template.yaml secret.yaml
# 2. Fill in the literal values (NEVER commit the unencrypted file).
# 3. SOPS-encrypt: sops --encrypt --in-place secret.yaml (rename to secret.sops.yaml).
# 4. Add to kustomization.yaml resources list (commit the .sops.yaml only).
#
# This template stays in git as guidance. The .sops.yaml file is what gets applied.
apiVersion: v1
kind: Secret
metadata:
  name: data-olympus-mcp
  namespace: data-olympus
type: Opaque
stringData:
  KB_GIT_REMOTE_URL: "git@github.com:YOUR-ORG/YOUR-KB.git"
  # Paste the full content of your ed25519 deploy key here (multi-line value).
  # Generate with: ssh-keygen -t ed25519 -f /tmp/deploy-key -N ""
  # Then paste the contents of /tmp/deploy-key (the private key, NOT .pub).
  # Make sure a trailing newline is present after the last line.
  git-key: "REPLACE_WITH_ED25519_PRIVATE_KEY"
