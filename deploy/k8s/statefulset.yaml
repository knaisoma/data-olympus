apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: data-olympus-mcp
  namespace: data-olympus
spec:
  serviceName: data-olympus-mcp
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-olympus-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-olympus-mcp
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: data-olympus-mcp
          # Reproducible default: pin an immutable released tag (or a digest).
          # For opt-in auto-update, switch to a mutable channel tag (e.g.
          # ghcr.io/knaisoma/data-olympus:stable) with imagePullPolicy: Always and
          # a scheduled `kubectl rollout restart` or an image-update controller.
          image: ghcr.io/knaisoma/data-olympus:v0.1.1  # replace with your registry/tag or digest
          imagePullPolicy: IfNotPresent
          # The entrypoint starts as root to copy/chown the deploy key and bootstrap
          # /kb-main, then drops to uid 65534 via gosu. So we cannot runAsNonRoot at
          # the pod level, but we still drop all caps except those the entrypoint
          # needs, forbid privilege escalation, and run a read-only root filesystem
          # (writes go to the PVCs below and the /tmp emptyDir).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: data-olympus-mcp
          env:
            - name: KB_GIT_REMOTE_URL
              valueFrom:
                secretKeyRef:
                  name: data-olympus-mcp
                  key: KB_GIT_REMOTE_URL
            - name: KB_REMOTE_URL
              valueFrom:
                secretKeyRef:
                  name: data-olympus-mcp
                  key: KB_GIT_REMOTE_URL
          volumeMounts:
            - name: kb-main
              mountPath: /kb-main
            - name: kb-worktrees
              mountPath: /kb-worktrees
            - name: kb-state
              mountPath: /state
            - name: kb-index
              mountPath: /index
            - name: tmp
              mountPath: /tmp
            - name: git-key
              mountPath: /etc/git-key-mount
              subPath: git-key
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        # Writable scratch for the read-only root filesystem: the entrypoint copies
        # the deploy key to /tmp/git-key and uv writes its cache under /tmp.
        - name: tmp
          emptyDir: {}
        - name: git-key
          secret:
            secretName: data-olympus-mcp
            defaultMode: 0400
            items:
              - key: git-key
                path: git-key
  volumeClaimTemplates:
    - metadata:
        name: kb-main
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: kb-worktrees
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: kb-state
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: kb-index
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
