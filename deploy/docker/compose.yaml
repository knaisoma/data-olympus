services:
  data-olympus-mcp:
    image: data-olympus:local
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      KB_MAIN_PATH: /kb-main
      KB_INDEX_PATH: /index/kb.db
      KB_HTTP_PORT: "8080"
      KB_SYNC_INTERVAL_SEC: "60"
      KB_STALENESS_DEGRADED_SEC: "600"
      KB_REMOTE_URL: ""
    volumes:
      - kb-main:/kb-main
      - kb-worktrees:/kb-worktrees
      - kb-state:/state
      - kb-index:/index
    restart: unless-stopped

volumes:
  kb-main:
  kb-worktrees:
  kb-state:
  kb-index:
