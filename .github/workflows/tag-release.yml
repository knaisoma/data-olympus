# .github/workflows/tag-release.yml
name: Promote complete release candidate

on:
  push:
    branches: [main]

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Decide stable release version
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(python3 scripts/should_tag.py --print-version)"
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            TAG=""
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  resolve-rc:
    needs: decide
    if: needs.decide.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image_digest: ${{ steps.resolve.outputs.image_digest }}
      rc_tag: ${{ steps.resolve.outputs.rc_tag }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve the highest complete prerelease
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.decide.outputs.version }}
          REPO: ghcr.io/knaisoma/data-olympus
        run: |
          mkdir -p candidate
          gh release list --limit 100 --json tagName,isPrerelease,isDraft \
            --jq '.[] | select(.isPrerelease and (.isDraft | not)) | .tagName' \
            > /tmp/prereleases.txt
          : > /tmp/complete-rcs.txt
          while IFS= read -r candidate_tag; do
            case "$candidate_tag" in
              "$VERSION"-rc.[0-9]*) ;;
              *) continue ;;
            esac
            assets="$(gh release view "$candidate_tag" --json assets --jq '.assets[].name')"
            if grep -qx 'release-provenance.json' <<<"$assets" && \
               grep -Eq '^data_olympus-.*\.whl$' <<<"$assets" && \
               grep -Eq '^data_olympus-.*\.tar\.gz$' <<<"$assets"; then
              echo "$candidate_tag" >> /tmp/complete-rcs.txt
            fi
          done < /tmp/prereleases.txt
          RC_TAG="$(python3 scripts/rc_tag.py --base "$VERSION" --current < /tmp/complete-rcs.txt)"
          test -n "$RC_TAG"
          gh release download "$RC_TAG" --pattern release-provenance.json --dir candidate
          SOURCE_SHA="$(jq -r .source_sha candidate/release-provenance.json)"
          IMAGE_DIGEST="$(jq -r .image_digest candidate/release-provenance.json)"
          test "$(jq -r .candidate_tag candidate/release-provenance.json)" = "$RC_TAG"
          test "$(jq -r .candidate.version candidate/release-provenance.json)" \
            = "${VERSION}rc${RC_TAG##*.}"
          test -n "$SOURCE_SHA"
          test -n "$IMAGE_DIGEST"
          python3 - <<'PY'
          import json
          import urllib.request

          with open("candidate/release-provenance.json", encoding="utf-8") as stream:
              provenance = json.load(stream)
          candidate = provenance["candidate"]
          url = f"https://pypi.org/pypi/data-olympus/{candidate['version']}/json"
          with urllib.request.urlopen(url, timeout=15) as response:
              pypi = json.load(response)
          remote = {item["filename"]: item["digests"]["sha256"] for item in pypi["urls"]}
          expected = {
              candidate["wheel"]: candidate["wheel_sha256"],
              candidate["sdist"]: candidate["sdist_sha256"],
          }
          if any(remote.get(name) != sha256 for name, sha256 in expected.items()):
              raise SystemExit("candidate PyPI sha256 does not match provenance")
          PY
          git fetch origin "refs/tags/$RC_TAG:refs/tags/$RC_TAG"
          test "$(git rev-list -n 1 "$RC_TAG")" = "$SOURCE_SHA"
          git merge-base --is-ancestor "$SOURCE_SHA" HEAD
          docker buildx imagetools inspect "$REPO@$IMAGE_DIGEST" >/dev/null
          {
            echo "rc_tag=$RC_TAG"
            echo "source_sha=$SOURCE_SHA"
            echo "image_digest=$IMAGE_DIGEST"
          } >> "$GITHUB_OUTPUT"

  create-tag:
    needs: [decide, resolve-rc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-rc.outputs.source_sha }}
          fetch-depth: 0
      - name: Guard stable registry availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.decide.outputs.tag }}
        run: python3 scripts/check_version_free.py --version "${TAG#v}"
      - name: Create and push annotated tag
        env:
          TAG: ${{ needs.decide.outputs.tag }}
          SOURCE_SHA: ${{ needs.resolve-rc.outputs.source_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            test "$(git rev-list -n 1 "$TAG")" = "$SOURCE_SHA"
          else
            git tag -a "$TAG" "$SOURCE_SHA" -m "Release ${TAG#v}"
            git push origin "$TAG"
          fi

  publish-pypi:
    needs: [decide, resolve-rc, create-tag]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/data-olympus
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-rc.outputs.source_sha }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - name: Download candidate comparison inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ needs.resolve-rc.outputs.rc_tag }}
        run: |
          mkdir -p candidate
          gh release download "$RC_TAG" \
            --pattern '*.whl' --pattern release-provenance.json --dir candidate
      - name: Build and compare stable Python artifacts
        env:
          VERSION: ${{ needs.decide.outputs.version }}
        run: |
          CANDIDATE_WHEEL="$(find candidate -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$CANDIDATE_WHEEL"
          uv run python scripts/release_artifacts.py stable \
            --base "$VERSION" --source . --output dist \
            --candidate-provenance candidate/release-provenance.json \
            --candidate-wheel "$CANDIDATE_WHEEL" \
            --provenance release-provenance.json
          uvx twine check --strict dist/*
          uv run python scripts/smoke_installed_wheel.py --wheel dist/*.whl
      - name: Publish stable package using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Verify stable PyPI files by SHA256
        env:
          VERSION: ${{ needs.decide.outputs.version }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import time
          import urllib.request

          url = f"https://pypi.org/pypi/data-olympus/{os.environ['VERSION']}/json"
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      payload = json.load(response)
                  break
              except Exception:
                  if attempt == 11:
                      raise
                  time.sleep(5)
          remote = {item["filename"]: item["digests"]["sha256"] for item in payload["urls"]}
          for path in sorted(pathlib.Path("dist").iterdir()):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              if remote.get(path.name) != digest:
                  raise SystemExit(f"PyPI SHA256 mismatch for {path.name}")
          PY
      - name: Upload stable release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: stable-${{ needs.decide.outputs.tag }}
          path: |
            dist/
            release-provenance.json
          if-no-files-found: error

  promote-image:
    needs: [decide, resolve-rc, create-tag, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Re-tag the verified candidate digest
        env:
          IMAGE_DIGEST: ${{ needs.resolve-rc.outputs.image_digest }}
          REPO: ghcr.io/knaisoma/data-olympus
          TAG: ${{ needs.decide.outputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "$REPO:$TAG" --tag "$REPO:stable" --tag "$REPO:latest" \
            "$REPO@$IMAGE_DIGEST"
          for channel in "$TAG" stable latest; do
            docker buildx imagetools inspect "$REPO:$channel" \
              | grep -F "Digest:    $IMAGE_DIGEST"
          done

  release:
    needs: [decide, resolve-rc, create-tag, publish-pypi, promote-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-rc.outputs.source_sha }}
      - uses: actions/download-artifact@v8
        with:
          name: stable-${{ needs.decide.outputs.tag }}
      - name: Create GitHub release after Python and OCI publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ needs.resolve-rc.outputs.source_sha }}
          TAG: ${{ needs.decide.outputs.tag }}
        run: |
          NOTES="docs/releases/${TAG}.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            test "$(gh release view "$TAG" --json targetCommitish --jq .targetCommitish)" \
              = "$SOURCE_SHA"
            gh release upload "$TAG" dist/* release-provenance.json --clobber
          elif [ -f "$NOTES" ]; then
            gh release create "$TAG" --target "$SOURCE_SHA" --title "$TAG" \
              --notes-file "$NOTES" dist/* release-provenance.json
          else
            gh release create "$TAG" --target "$SOURCE_SHA" --title "$TAG" \
              --generate-notes dist/* release-provenance.json
          fi
