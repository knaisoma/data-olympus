# .github/workflows/tag-release.yml
name: Tag release on version bump

on:
  push:
    branches: [main]

# Serialize release runs on main so two close pushes (or a manual rerun) do not
# race on creating and pushing the same tag. Never cancel an in-flight release.
concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Decide tag from pyproject version
        id: decide
        run: |
          TAG="$(python3 scripts/should_tag.py)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create and push annotated tag
        if: steps.decide.outputs.tag != ''
        env:
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Idempotent: a re-run after a partial failure must not hard-fail on an
          # existing tag.
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag -a "$TAG" -m "Release ${TAG#v}"
          fi
          # This tag is pushed with the default GITHUB_TOKEN on purpose. GitHub does not
          # trigger workflows from GITHUB_TOKEN-created events, so release-image.yml
          # (on: push tags v*) does not fire here, and the build-image job below builds
          # the image instead. release-image.yml's tag trigger remains the manual-tag
          # fallback path (STD-U-810 section 9) for a human-pushed tag. If this push is
          # ever switched to a PAT or GitHub App token, release-image.yml will also fire
          # and double-build plus double-move latest. Keep it on GITHUB_TOKEN.
          git push origin "$TAG"

  # Build and publish the image BEFORE the GitHub Release is created, so a
  # published Release always has its image. If this build fails, the tag exists
  # but no Release is published; a rerun is safe (tag creation and this build are
  # both idempotent).
  build-image:
    needs: decide
    if: needs.decide.outputs.tag != ''
    uses: ./.github/workflows/release-image-reusable.yml
    with:
      tag: ${{ needs.decide.outputs.tag }}
      move_latest: true
    permissions:
      contents: read
      packages: write

  # Publish sdist + wheel to PyPI via Trusted Publishing (OIDC, no token). Runs
  # off the SAME decided tag as build-image, so a release publishes the image AND
  # the package from one main-push flow. This is the primary PyPI path: the tag is
  # pushed with GITHUB_TOKEN, which does NOT trigger publish-pypi.yml's `on: push
  # tags`, so we call the reusable workflow here (exactly as build-image does).
  #
  # Publish sdist + wheel to PyPI via Trusted Publishing (OIDC, no token). The
  # steps run INLINE here (not via a reusable workflow) on purpose: PyPI's OIDC
  # exchange does not reliably match a publisher when the publishing step runs
  # inside a called reusable workflow (the gh-action-pypi-publish action itself
  # warns against reusable workflows). Running inline makes the entry workflow
  # (tag-release.yml) the publishing workflow, matching the registered pypi.org
  # Trusted Publisher (workflow=tag-release.yml, environment=pypi). Runs off the
  # SAME decided tag as build-image. Does not gate the GitHub Release (which needs
  # only build-image), so a PyPI hiccup surfaces as a failed job without blocking
  # the tag/image/release. See docs/releases/pypi-trusted-publishing.md.
  publish-pypi:
    needs: decide
    if: needs.decide.outputs.tag != ''
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/data-olympus
    permissions:
      contents: read
      # id-token: write mints the OIDC token gh-action-pypi-publish exchanges for
      # a short-lived upload credential. No secret token exists.
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.decide.outputs.tag }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - name: Build sdist + wheel
        run: uv build
      - name: Verify metadata (twine check)
        run: uvx twine check --strict dist/*
      - name: Smoke-test the built wheel
        run: |
          uvx --from ./dist/*.whl data-olympus --help
          uvx --from ./dist/*.whl data-olympus setup --check --no-version-check
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # skip-existing so a partial-failure rerun of an already-uploaded version
        # is a no-op, not an error (mirrors the idempotent tag/image/release jobs).
        # No continue-on-error: the publisher is configured, so a real upload
        # failure must be visible rather than silently swallowed.
        with:
          skip-existing: true

  release:
    needs: [decide, build-image]
    if: needs.decide.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub Release (after the image is published)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.decide.outputs.tag }}
        run: |
          # Idempotent: skip if the release already exists (partial-failure rerun).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists, skipping"
            exit 0
          fi
          NOTES="docs/releases/${TAG}.md"
          if [ -f "$NOTES" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
