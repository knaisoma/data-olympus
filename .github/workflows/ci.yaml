name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv venv --python 3.13
      - run: uv pip install -e '.[dev]'
      - run: uv run ruff check .
      - run: uv run mypy src
      - name: Benchmark docs drift guard (docs match committed results)
        run: uv run python scripts/check_benchmark_docs.py
      - run: uv run pytest -v
      - name: Install bats + jq (CLI contract tests)
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: bin/kb CLI tests (bats)
        run: bats -r tests
      - name: Lint example bundle (dogfood conformance check)
        run: uv run data-olympus lint example-bundle
  changelog-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check changelog updated for functional changes
        env:
          KB_NO_CHANGELOG: ${{ contains(github.event.pull_request.labels.*.name, 'no-changelog') && '1' || '0' }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          mapfile -t changed < <(git diff --name-only "origin/$BASE_REF"...HEAD)
          python3 scripts/check_changelog.py "${changed[@]}"
  doc-consistency-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv venv --python 3.13
      - run: uv pip install -e '.[dev]'
      - name: Check SPEC.md / docs/adoption.md enums match format/validate.py
        run: uv run python3 scripts/check_doc_consistency.py
