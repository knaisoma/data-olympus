name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv venv --python 3.13
      - run: uv pip install -e '.[dev]'
      - run: uv run ruff check .
      - run: uv run mypy src
      - name: Benchmark docs drift guard (docs match committed results)
        run: uv run python scripts/check_benchmark_docs.py
      - run: uv run pytest -v
      - name: Install bats + jq (CLI contract tests)
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: bin/kb CLI tests (bats)
        run: bats -r tests
      - name: Lint example bundle (dogfood conformance check)
        run: uv run data-olympus lint example-bundle
  changelog-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check changelog updated for functional changes
        env:
          KB_NO_CHANGELOG: ${{ contains(github.event.pull_request.labels.*.name, 'no-changelog') && '1' || '0' }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          mapfile -t changed < <(git diff --name-only "origin/$BASE_REF"...HEAD)
          python3 scripts/check_changelog.py "${changed[@]}"
  version-free-guard:
    # Catch a duplicate DECLARED version before merge: if the PR bumps
    # [project].version to something already published on PyPI, ghcr, or as a
    # GitHub release/tag, fail here rather than at tag-release time (where a
    # failed guard would still be after the merge). A registry outage fails
    # closed; the release cutter can override with KB_BYPASS_VERSION_CHECK=1.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Guard against a duplicate declared version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Only enforce when THIS pr changes [project].version. The version is
          # bumped at release time, so on a normal PR the declared version still
          # equals the last released (published) one; checking it unconditionally
          # would fail every non-release PR. Compare against the base branch and
          # skip when unchanged.
          HEAD_VERSION="$(python3 scripts/should_tag.py --print-version)"
          BASE_VERSION="$(git show "origin/$BASE_REF:pyproject.toml" | python3 -c 'import sys,tomllib; print(tomllib.loads(sys.stdin.buffer.read().decode())["project"]["version"])')"
          if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
            echo "declared version unchanged ($HEAD_VERSION); nothing to guard"
            exit 0
          fi
          echo "declared version changed $BASE_VERSION -> $HEAD_VERSION; checking it is free"
          python3 scripts/check_version_free.py --version "$HEAD_VERSION"
  doc-consistency-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv venv --python 3.13
      - run: uv pip install -e '.[dev]'
      - name: Check SPEC.md / docs/adoption.md enums match format/validate.py
        run: uv run python3 scripts/check_doc_consistency.py
