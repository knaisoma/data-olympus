# .github/workflows/release-image-reusable.yml
name: build-and-push-image
on:
  workflow_call:
    inputs:
      ref:
        description: "immutable git ref to build"
        required: true
        type: string
      tag:
        description: "image tag to publish, e.g. v0.1.0 or edge"
        required: true
        type: string
      move_latest:
        description: "also move the :latest channel"
        required: false
        default: false
        type: boolean
      channel:
        description: "also push this moving channel tag (e.g. rc, kndev); empty = none"
        required: false
        default: ""
        type: string
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Resolve source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: image-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          MOVE_LATEST: ${{ inputs.move_latest }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/knaisoma/data-olympus:$INPUT_TAG"
            if [ "$MOVE_LATEST" = "true" ]; then
              echo "ghcr.io/knaisoma/data-olympus:latest"
            fi
            if [ -n "$INPUT_CHANNEL" ]; then
              echo "ghcr.io/knaisoma/data-olympus:$INPUT_CHANNEL"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-tag.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
