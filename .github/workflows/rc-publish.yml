# .github/workflows/rc-publish.yml
name: Publish release candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "exact branch, tag, or SHA to publish as a complete candidate"
        required: true
        type: string
      number:
        description: "positive release candidate number, for example 3"
        required: true
        type: number

concurrency:
  group: rc-publish-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rc_number: ${{ steps.rc.outputs.rc_number }}
      rc_tag: ${{ steps.rc.outputs.rc_tag }}
      version: ${{ steps.rc.outputs.version }}
      pypi_version: ${{ steps.rc.outputs.pypi_version }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Resolve source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Compute explicit RC versions
        id: rc
        env:
          RC_NUMBER: ${{ inputs.number }}
        run: |
          VERSION="$(python3 -c 'from scripts.should_tag import project_version; print(project_version(open("pyproject.toml").read()))')"
          export VERSION
          python3 -c 'import os; from scripts.release_artifacts import CandidateVersion; CandidateVersion.from_base(os.environ["VERSION"], int(os.environ["RC_NUMBER"]))'
          RC_TAG="${VERSION}-rc.${RC_NUMBER}"
          {
            echo "version=$VERSION"
            echo "rc_tag=$RC_TAG"
            echo "rc_number=$RC_NUMBER"
            echo "pypi_version=${VERSION}rc${RC_NUMBER}"
          } >> "$GITHUB_OUTPUT"

  inspect-image:
    needs: decide
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
      present: ${{ steps.inspect.outputs.present }}
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Reuse only a same-source candidate image
        id: inspect
        env:
          RC_TAG: ${{ needs.decide.outputs.rc_tag }}
          SOURCE_SHA: ${{ needs.decide.outputs.source_sha }}
          REPO: ghcr.io/knaisoma/data-olympus
        run: |
          if docker buildx imagetools inspect \
              "$REPO:$RC_TAG" > /tmp/image.txt 2> /tmp/image-error.txt; then
            DIGEST="$(awk '/^Digest:/ {print $2; exit}' /tmp/image.txt)"
            docker pull "$REPO:$RC_TAG"
            REVISION="$(docker image inspect \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
              "$REPO:$RC_TAG")"
            test "$REVISION" = "$SOURCE_SHA"
            {
              echo "present=true"
              echo "digest=$DIGEST"
            } >> "$GITHUB_OUTPUT"
          elif grep -qiE 'manifest unknown|not found|no such manifest' \
              /tmp/image-error.txt; then
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/image-error.txt >&2
            exit 1
          fi

  build-image:
    needs: [decide, inspect-image]
    if: needs.inspect-image.outputs.present != 'true'
    uses: ./.github/workflows/release-image-reusable.yml
    with:
      ref: ${{ needs.decide.outputs.source_sha }}
      tag: ${{ needs.decide.outputs.rc_tag }}
      move_latest: false
    permissions:
      contents: read
      packages: write

  build-python:
    needs: decide
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.decide.outputs.source_sha }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - name: Build candidate Python artifacts and provenance
        env:
          VERSION: ${{ needs.decide.outputs.version }}
          RC_NUMBER: ${{ needs.decide.outputs.rc_number }}
        run: |
          uv run python scripts/release_artifacts.py candidate \
            --base "$VERSION" --number "$RC_NUMBER" --source . \
            --output dist --provenance release-provenance.json
          uvx twine check --strict dist/*
          for artifact in dist/*.whl dist/*.tar.gz; do
            uv run python scripts/smoke_installed_wheel.py \
              --artifact "$artifact" --expected-version "${VERSION}rc${RC_NUMBER}"
          done
      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v7
        with:
          name: candidate-${{ needs.decide.outputs.rc_tag }}
          path: |
            dist/
            release-provenance.json
          if-no-files-found: error

  publish-pypi:
    needs: [decide, build-python]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/data-olympus
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download candidate artifacts
        uses: actions/download-artifact@v8
        with:
          name: candidate-${{ needs.decide.outputs.rc_tag }}
      - name: Publish candidate to PyPI using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Verify PyPI files by SHA256
        env:
          PYPI_VERSION: ${{ needs.decide.outputs.pypi_version }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import time
          import urllib.request

          url = f"https://pypi.org/pypi/data-olympus/{os.environ['PYPI_VERSION']}/json"
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      payload = json.load(response)
                  break
              except Exception:
                  if attempt == 11:
                      raise
                  time.sleep(5)
          remote = {item["filename"]: item["digests"]["sha256"] for item in payload["urls"]}
          dist = pathlib.Path("dist")
          artifacts = sorted([*dist.glob("*.whl"), *dist.glob("*.tar.gz")])
          if not artifacts:
              raise SystemExit("No publishable Python artifacts found")
          local = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in artifacts
          }
          if remote != local:
              raise SystemExit(f"PyPI SHA256 mismatch: local={local}, remote={remote}")
          PY

  finalize:
    needs: [decide, inspect-image, build-image, build-python, publish-pypi]
    if: >-
      always() && needs.decide.result == 'success' &&
      needs.inspect-image.result == 'success' &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped') &&
      needs.build-python.result == 'success' && needs.publish-pypi.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.decide.outputs.source_sha }}
          fetch-depth: 0
      - name: Download candidate artifacts
        uses: actions/download-artifact@v8
        with:
          name: candidate-${{ needs.decide.outputs.rc_tag }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Finalize provenance and move the RC channel
        env:
          IMAGE_DIGEST: ${{ needs.inspect-image.outputs.digest || needs.build-image.outputs.digest }}
          RC_TAG: ${{ needs.decide.outputs.rc_tag }}
          SOURCE_SHA: ${{ needs.decide.outputs.source_sha }}
          REPO: ghcr.io/knaisoma/data-olympus
        run: |
          test -n "$IMAGE_DIGEST"
          docker buildx imagetools inspect "$REPO:$RC_TAG" \
            | grep -E "Digest:[[:space:]]*$IMAGE_DIGEST"
          python3 scripts/release_artifacts.py finalize-candidate \
            --provenance release-provenance.json \
            --output release-provenance.final.json \
            --source-sha "$SOURCE_SHA" --candidate-tag "$RC_TAG" \
            --image-digest "$IMAGE_DIGEST"
          mv release-provenance.final.json release-provenance.json
          docker buildx imagetools create --tag "$REPO:rc" "$REPO@$IMAGE_DIGEST"
          docker buildx imagetools inspect "$REPO:rc" \
            | grep -E "Digest:[[:space:]]*$IMAGE_DIGEST"
      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ needs.decide.outputs.rc_tag }}
          VERSION: ${{ needs.decide.outputs.version }}
          SOURCE_SHA: ${{ needs.decide.outputs.source_sha }}
        run: |
          NOTES="docs/releases/v${VERSION}.md"
          if gh release view "$RC_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RC_TAG:refs/tags/$RC_TAG"
            test "$(git rev-list -n 1 "$RC_TAG")" = "$SOURCE_SHA"
            gh release upload "$RC_TAG" dist/* release-provenance.json --clobber
          elif [ -f "$NOTES" ]; then
            gh release create "$RC_TAG" --prerelease --target "$SOURCE_SHA" \
              --title "$RC_TAG" --notes-file "$NOTES" \
              dist/* release-provenance.json
          else
            gh release create "$RC_TAG" --prerelease --target "$SOURCE_SHA" \
              --title "$RC_TAG" --notes "Release candidate $RC_TAG for $VERSION." \
              dist/* release-provenance.json
          fi
          gh release view "$RC_TAG" --json isDraft,isPrerelease,assets
