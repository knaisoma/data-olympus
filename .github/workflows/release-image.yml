# .github/workflows/release-image.yml
name: Release Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "image tag to publish, e.g. v0.1.0"
        required: false
        default: "edge"

jobs:
  # A real release is a pushed `v*` tag: publish the semver tag AND move `latest`.
  # A manual workflow_dispatch (default `edge`) is a pre-release build: publish
  # ONLY its tag, never move `latest`.
  release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    uses: ./.github/workflows/release-image-reusable.yml
    with:
      ref: ${{ github.ref_name }}
      tag: ${{ github.ref_name }}
      move_latest: true
    permissions:
      contents: read
      packages: write
  prerelease:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/release-image-reusable.yml
    with:
      ref: ${{ github.sha }}
      tag: ${{ inputs.tag }}
      move_latest: false
    permissions:
      contents: read
      packages: write
